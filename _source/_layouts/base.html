<!DOCTYPE html>
<html lang="en" {% if theme %} class="{{ theme }}"{% endif %}>

  <head>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cloudinary-core/2.11.4/cloudinary-core-shrinkwrap.js" integrity="sha512-ncpTgabork7MaotpdVQQegdGsZqRvZ4j0vsUV73i2hwGD9cXObQtBSb0UKkUU2z5p999tHmzh67TTdbY4V55/A==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <meta charset="utf-8">

    <script>document.documentElement.classList.add('js');</script>

    <title>{% if title %}{{ title | escape }} | {% endif %}{{ site.title | escape }}</title>

    <meta name="description" content="{% if description %}{{ description | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">

    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    {%- if noindex -%}
    <meta name="robots" content="noindex, nofollow">
    {%- endif -%}

    {%- if canonical -%}
    <link rel="canonical" href="{{ canonical }}">
    {%- else -%}
    <link rel="canonical" href="{{ env.baseUrl }}{{ page.url }}">
    {%- endif -%}

    <link rel="alternate icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-32x32.png">
    <link rel="icon" type="image/svg+xml" href="/assets/icons/favicon.svg">
    <link rel="mask-icon" href="/assets/icons/favicon.svg" color="#000000">
    <link rel="apple-touch-icon" href="/assets/icons/favicon-196x196.png">

    <style>
      @view-transition {
        navigation: auto;
      }

      ::view-transition-old(root),
      ::view-transition-new(root) {
        animation-duration: 0.1s;
      }

      {% getBundle "css" %}
    </style>

    <link rel="stylesheet" href="/assets/css/main.css" media="all">

    {%- if stylesheet -%}
    <link rel="stylesheet" href="/assets/css/{{ stylesheet }}" media="all">
    {%- endif -%}

    <script src="/assets/js/app.js" type="module"></script>

    {%- if javascript -%}
    <script src="/assets/js/{{ javascript }}"  type="module"></script>
    {%- endif -%}

  </head>

  <body {% if class %} class="{{ class }}"{% endif %}>

    <scroll-sentinel></scroll-sentinel>

    <animate-on-scroll>
      {{ content }}
    </animate-on-scroll>

  </body>
<script type="text/javascript">
      my_breakpoints = function (width){  // width - the current width of the containing element
        return 50 * Math.ceil(width / 50);
      }
      var cl = cloudinary.Cloudinary.new({cloud_name: "paulapplegate-com"}); 
      // replace 'demo' with your cloud name in the line above 
      cl.config({breakpoints:my_breakpoints, responsive_use_breakpoints:"resize"})
      cl.responsive();
  </script>
</html>
